<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>欢迎来到 Xboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
        .landing-page, #app { display: none; height: 100%; width: 100%; }
        .landing-page {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #f4f4f4;
            text-align: center;
            height: 100vh;
        }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
    <script>
        function enterApp() {
            document.querySelector('.landing-page').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            localStorage.setItem('visited', 'yes'); // 记录用户访问
            loadApp();
        }

        function loadApp() {
            const script = document.createElement('script');
            script.type = 'module';
            script.crossOrigin = 'anonymous';
            script.src = '/assets/umi.js';
            document.body.appendChild(script);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('visited') === 'yes') {
                enterApp();
            } else {
                document.querySelector('.landing-page').style.display = 'flex';
            }
        });
    </script>
</head>
<body>

    <!-- 落地页 -->
    <div class="landing-page">
        <h1>欢迎来到 Xboard</h1>
        <p>您的数据分析与管理平台</p>
        <button class="btn" onclick="enterApp()">进入 Xboard</button>
    </div>

    <!-- Xboard 应用 -->
    <div id="app"></div>

    <script src="./env.js"></script>

</body>
</html>
